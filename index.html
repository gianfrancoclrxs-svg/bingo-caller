<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Caller</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
  padding: 20px;
}

h1 { margin-bottom: 10px; }

.current {
  font-size: 60px;
  margin: 20px 0;
  font-weight: bold;
}

.recent {
  margin-top: 20px;
  font-size: 18px;
}

button {
  margin: 10px;
  padding: 12px 20px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.start { background: #28a745; color: white; }
.reset { background: #dc3545; color: white; }
.bingo { background: gold; color: black; }

.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#overlayText {
  font-size: 120px;
  font-weight: bold;
  color: gold;
  animation: pop 0.4s ease;
}

@keyframes pop {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.hidden { display: none; }
</style>
</head>

<body>

<h1>🎱 Bingo Caller</h1>

<div class="current" id="currentBall">--</div>

<div>
  <button class="start" id="startBtn" onclick="toggleCalling()">Start</button>
  <button class="bingo" onclick="callBingo()">BINGO</button>
  <button class="reset" onclick="resetGame()">Reset</button>
</div>

<div class="recent">
  <h3>Recent Balls:</h3>
  <div id="recentList"></div>
</div>

<div id="overlay" class="overlay hidden">
  <div id="overlayText"></div>
</div>

<script>
let numbers = [];
let calledNumbers = [];

let isCalling = false;
let isPaused = false;
let isPlaying = false;

let loopTimer = null;

// ==========================
// INIT GAME
// ==========================
function initGame() {
  numbers = Array.from({ length: 75 }, (_, i) => i + 1);

  // shuffle
  for (let i = numbers.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
  }

  calledNumbers = [];

  document.getElementById("currentBall").textContent = "--";
  document.getElementById("recentList").textContent = "";

  clearTimeout(loopTimer);
  loopTimer = null;
}

// ==========================
// LETTER SYSTEM
// ==========================
function getLetter(num) {
  if (num <= 15) return "B";
  if (num <= 30) return "I";
  if (num <= 45) return "N";
  if (num <= 60) return "G";
  return "O";
}

// ==========================
// VOICE (FIXED FOR VERCEL)
// ==========================
function speak(text) {
  const utterance = new SpeechSynthesisUtterance(text);

  const voices = speechSynthesis.getVoices();

  const female =
    voices.find(v => v.name.toLowerCase().includes("female")) ||
    voices.find(v => v.lang.includes("en-US")) ||
    voices[0];

  if (female) utterance.voice = female;

  utterance.rate = 0.75;
  utterance.pitch = 1.2;

  speechSynthesis.cancel();

  setTimeout(() => {
    speechSynthesis.speak(utterance);
  }, 50);
}

// ==========================
// OVERLAY
// ==========================
function showOverlay(text) {
  const overlay = document.getElementById("overlay");
  const overlayText = document.getElementById("overlayText");

  overlayText.textContent = text;
  overlay.classList.remove("hidden");

  setTimeout(() => {
    overlay.classList.add("hidden");
  }, 1500);
}

// ==========================
// PLAY NUMBER (MP3 OR VOICE)
// ==========================
function playNumber(num) {
  return new Promise((resolve) => {
    isPlaying = true;

    const label = getLetter(num) + "-" + num;
    const audio = new Audio("audio/" + num + ".mp3");

    let finished = false;

    const done = () => {
      if (finished) return;
      finished = true;
      isPlaying = false;
      resolve();
    };

    // If audio plays → NO VOICE, NO OVERLAY
    audio.onended = () => {
      done();
    };

    // If audio missing → VOICE + OVERLAY
    audio.onerror = () => {
      speak(label);
      showOverlay(label);
      setTimeout(done, 2000);
    };

    // extra safety
    audio.play().catch(() => {
      speak(label);
      showOverlay(label);
      setTimeout(done, 2000);
    });
  });
}

// ==========================
// MAIN LOOP (NO DUPLICATES)
// ==========================
function loop() {
  if (!isCalling) return;

  if (isPaused || isPlaying) {
    loopTimer = setTimeout(loop, 500);
    return;
  }

  if (numbers.length === 0) return;

  const num = numbers.pop();
  calledNumbers.unshift(num);

  document.getElementById("currentBall").textContent = num;
  document.getElementById("recentList").textContent =
    calledNumbers.slice(0, 10).join(", ");

  playNumber(num).then(() => {
    loopTimer = setTimeout(loop, 7000);
  });
}

// ==========================
// START / PAUSE / RESUME
// ==========================
function toggleCalling() {
  const btn = document.getElementById("startBtn");

  // 🔥 unlock voice on first click (IMPORTANT for Vercel)
  speechSynthesis.cancel();

  if (!isCalling) {
    isCalling = true;
    isPaused = false;
    btn.textContent = "Pause";
    loop();
  } 
  else if (!isPaused) {
    isPaused = true;
    btn.textContent = "Resume";
  } 
  else {
    isPaused = false;
    btn.textContent = "Pause";
    loop();
  }
}

// ==========================
// BINGO
// ==========================
function callBingo() {
  isCalling = false;
  isPaused = false;

  clearTimeout(loopTimer);

  let randomBingo = Math.floor(Math.random() * 5) + 1;
  const audio = new Audio("audio/Bingo" + randomBingo + ".mp3");

  audio.play();

  audio.onended = () => {
    if (confirm("BINGO! Restart game?")) {
      resetGame();
    }
  };
}

// ==========================
// RESET
// ==========================
function resetGame() {
  isCalling = false;
  isPaused = false;
  isPlaying = false;

  clearTimeout(loopTimer);

  document.getElementById("startBtn").textContent = "Start";

  initGame();
}

// ==========================
// INIT
// ==========================
initGame();
speechSynthesis.onvoiceschanged = () => {};
</script>

</body>
</html>
