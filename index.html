<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Caller</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  text-align: center;
  margin: 0;
  padding: 20px;
}

/* CURRENT BALL */
.current {
  font-size: 70px;
  margin: 10px;
  font-weight: bold;
  color: gold;
}

/* BUTTONS */
button {
  margin: 8px;
  padding: 10px 18px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.start { background: green; color: white; }
.reset { background: red; color: white; }
.bingo { background: gold; color: black; }

/* RECENT */
#recentList {
  margin-top: 10px;
  font-size: 18px;
}

/* BOARD */
.board {
  display: grid;
  grid-template-columns: repeat(15, 1fr);
  gap: 5px;
  margin-top: 25px;
  max-width: 900px;
  margin-left: auto;
  margin-right: auto;
}

.cell {
  padding: 8px;
  background: #222;
  border-radius: 5px;
  font-size: 14px;
}

.called {
  background: #444;
  color: #888;
}

.last {
  background: red !important;
  color: white !important;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🎱 Bingo Caller</h1>

<div class="current" id="currentBall">--</div>

<button class="start" id="startBtn" onclick="toggleCalling()">Start</button>
<button class="bingo" onclick="callBingo()">BINGO</button>
<button class="reset" onclick="resetGame()">Reset</button>

<div id="recentList"></div>

<!-- BOARD -->
<div class="board" id="board"></div>

<script>
let numbers = [];
let calledNumbers = [];

let isCalling = false;
let isPaused = false;
let loopTimer = null;

let lastCalled = null;

// ================= INIT =================
function initGame() {
  numbers = Array.from({ length: 75 }, (_, i) => i + 1);

  for (let i = numbers.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
  }

  calledNumbers = [];
  lastCalled = null;

  document.getElementById("currentBall").textContent = "--";
  document.getElementById("recentList").textContent = "";

  buildBoard();
}

// ================= LETTER =================
function getLetter(num) {
  if (num <= 15) return "B";
  if (num <= 30) return "I";
  if (num <= 45) return "N";
  if (num <= 60) return "G";
  return "O";
}

// ================= AUDIO =================
function playAudio(num) {
  const audio = new Audio("./audio/" + num + ".mp3");
  audio.play().catch(err => {
    console.log("Audio failed:", num, err);
  });
}

// ================= BOARD =================
function buildBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";

  for (let i = 1; i <= 75; i++) {
    const div = document.createElement("div");
    div.className = "cell";
    div.id = "cell-" + i;
    div.innerText = getLetter(i) + i;
    board.appendChild(div);
  }
}

// ================= UPDATE BOARD =================
function updateBoard(num) {
  if (lastCalled) {
    document.getElementById("cell-" + lastCalled).classList.remove("last");
  }

  document.getElementById("cell-" + num).classList.add("called", "last");

  lastCalled = num;
}

// ================= NEXT BALL =================
function callNext() {
  if (!isCalling || isPaused) return;
  if (numbers.length === 0) return;

  const num = numbers.pop();
  const label = getLetter(num) + num;

  calledNumbers.unshift(label);

  document.getElementById("currentBall").textContent = label;

  document.getElementById("recentList").textContent =
    calledNumbers.slice(0, 10).join(" • ");

  playAudio(num);
  updateBoard(num);

  loopTimer = setTimeout(callNext, 7000);
}

// ================= START / PAUSE =================
function toggleCalling() {
  const btn = document.getElementById("startBtn");

  if (!isCalling) {
    isCalling = true;
    isPaused = false;
    btn.textContent = "Pause";
    callNext();
  } 
  else if (!isPaused) {
    isPaused = true;
    btn.textContent = "Resume";
    clearTimeout(loopTimer);
  } 
  else {
    isPaused = false;
    btn.textContent = "Pause";
    callNext();
  }
}

// ================= BINGO =================
function callBingo() {
  isCalling = false;
  clearTimeout(loopTimer);

  let rand = Math.floor(Math.random() * 5) + 1;
  new Audio("./audio/Bingo" + rand + ".mp3").play();
}

// ================= RESET =================
function resetGame() {
  isCalling = false;
  isPaused = false;
  clearTimeout(loopTimer);

  document.getElementById("startBtn").textContent = "Start";

  initGame();
}

// INIT
initGame();
</script>

</body>
</html>
