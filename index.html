<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Caller</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
  padding: 20px;
}

.current {
  font-size: 60px;
  margin: 20px 0;
  font-weight: bold;
}

button {
  margin: 10px;
  padding: 12px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.start { background: #28a745; color: white; }
.reset { background: #dc3545; color: white; }
.bingo { background: gold; color: black; }

.recent {
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🎱 Bingo Caller</h1>

<div class="current" id="currentBall">--</div>

<div>
  <button class="start" id="startBtn" onclick="toggleCalling()">Start</button>
  <button class="bingo" onclick="callBingo()">BINGO</button>
  <button class="reset" onclick="resetGame()">Reset</button>
</div>

<div class="recent">
  <h3>Recent Balls:</h3>
  <div id="recentList"></div>
</div>

<script>
let numbers = [];
let calledNumbers = [];

let isCalling = false;
let isPaused = false;
let isPlaying = false;
let loopTimer = null;

// ==========================
// INIT
// ==========================
function initGame() {
  numbers = Array.from({ length: 75 }, (_, i) => i + 1);

  for (let i = numbers.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
  }

  calledNumbers = [];

  document.getElementById("currentBall").textContent = "--";
  document.getElementById("recentList").textContent = "";

  clearTimeout(loopTimer);
}

// ==========================
// LETTER
// ==========================
function getLetter(num) {
  if (num <= 15) return "B";
  if (num <= 30) return "I";
  if (num <= 45) return "N";
  if (num <= 60) return "G";
  return "O";
}

// ==========================
// 🔊 VOICE FIX (VERCEL SAFE)
// ==========================
let selectedVoice = null;

// Load voices properly
function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return;

  selectedVoice =
    voices.find(v => v.name.toLowerCase().includes("female")) ||
    voices.find(v => v.lang.includes("en-US")) ||
    voices[0];
}

// Ensure voices load
speechSynthesis.onvoiceschanged = loadVoices;
setTimeout(loadVoices, 500);

// Speak
function speak(text) {
  if (!selectedVoice) {
    console.warn("No voice available");
    return;
  }

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.voice = selectedVoice;
  utterance.rate = 0.75;
  utterance.pitch = 1.2;

  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

// ==========================
// PLAY NUMBER
// ==========================
function playNumber(num) {
  return new Promise((resolve) => {
    isPlaying = true;

    const label = getLetter(num) + "-" + num;
    const audio = new Audio("audio/" + num + ".mp3");

    let finished = false;

    const done = () => {
      if (finished) return;
      finished = true;
      isPlaying = false;
      resolve();
    };

    // 🎧 If audio exists
    audio.onended = done;

    // ❌ If no audio → use voice
    audio.onerror = () => {
      speak(label);
      setTimeout(done, 2500);
    };

    audio.play().catch(() => {
      speak(label);
      setTimeout(done, 2500);
    });
  });
}

// ==========================
// LOOP
// ==========================
function loop() {
  if (!isCalling) return;

  if (isPaused || isPlaying) {
    loopTimer = setTimeout(loop, 500);
    return;
  }

  if (numbers.length === 0) return;

  const num = numbers.pop();
  calledNumbers.unshift(num);

  document.getElementById("currentBall").textContent = num;
  document.getElementById("recentList").textContent =
    calledNumbers.slice(0, 10).join(", ");

  playNumber(num).then(() => {
    loopTimer = setTimeout(loop, 7000);
  });
}

// ==========================
// START / PAUSE
// ==========================
function toggleCalling() {
  const btn = document.getElementById("startBtn");

  // 🔥 CRITICAL: unlock voice/audio
  const unlock = new SpeechSynthesisUtterance(" ");
  speechSynthesis.speak(unlock);
  speechSynthesis.cancel();

  if (!isCalling) {
    isCalling = true;
    isPaused = false;
    btn.textContent = "Pause";
    loop();
  } 
  else if (!isPaused) {
    isPaused = true;
    btn.textContent = "Resume";
  } 
  else {
    isPaused = false;
    btn.textContent = "Pause";
    loop();
  }
}

// ==========================
// BINGO
// ==========================
function callBingo() {
  isCalling = false;
  isPaused = false;

  clearTimeout(loopTimer);

  let rand = Math.floor(Math.random() * 5) + 1;
  new Audio("audio/Bingo" + rand + ".mp3").play();
}

// ==========================
// RESET
// ==========================
function resetGame() {
  isCalling = false;
  isPaused = false;
  isPlaying = false;

  clearTimeout(loopTimer);

  document.getElementById("startBtn").textContent = "Start";

  initGame();
}

// INIT
initGame();
</script>

</body>
</html>
