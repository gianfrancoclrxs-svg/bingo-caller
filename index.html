<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Caller</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  text-align: center;
  margin: 0;
  padding: 10px;
}

h1 { font-size: 20px; }

.current {
  font-size: 55px;
  margin: 10px;
  color: gold;
  font-weight: bold;
}

button {
  margin: 5px;
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
}

.start { background: green; color: white; }
.reset { background: red; color: white; }
.bingo { background: gold; color: black; }

#recentList {
  font-size: 14px;
  margin-top: 5px;
}

/* 🔥 CUSTOM GRID (YOUR REQUEST) */
.board {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  max-width: 300px;
  margin: 15px auto;
}

.cell {
  background: #222;
  padding: 10px;
  border-radius: 6px;
  font-size: 12px;
}

.called { background: #444; color: #888; }
.last { background: red !important; color: white !important; }
</style>
</head>

<body>

<h1>🎱 Bingo Caller</h1>

<div class="current" id="currentBall">--</div>

<button class="start" id="startBtn" onclick="toggle()">Start</button>
<button class="bingo" onclick="bingo()">BINGO</button>
<button class="reset" onclick="reset()">Reset</button>

<div id="recentList"></div>

<div class="board" id="board"></div>

<script>
let numbers=[];
let called=[];
let timer=null;
let running=false;
let last=null;

// ================= INIT =================
function init(){
  numbers=Array.from({length:75},(_,i)=>i+1);

  for(let i=numbers.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [numbers[i],numbers[j]]=[numbers[j],numbers[i]];
  }

  called=[];
  last=null;

  document.getElementById("currentBall").innerText="--";
  document.getElementById("recentList").innerText="";

  buildGrid();
}

// ================= GRID (YOUR CUSTOM LAYOUT) =================
function buildGrid(){
  const board=document.getElementById("board");
  board.innerHTML="";

  // 🔥 EXACT ORDER YOU WANTED:
  // 1,16,31,46,61
  // ...
  for(let col=0; col<15; col++){
    for(let row=0; row<5; row++){
      let num = col + 1 + row*15;

      let div=document.createElement("div");
      div.className="cell";
      div.id="c"+num;
      div.innerText=num;

      board.appendChild(div);
    }
  }
}

// ================= AUDIO FIX (CRITICAL) =================
function play(num){
  const audio=new Audio(`audio/${num}.mp3`);

  // 🔥 force reload for mobile fix
  audio.src=`audio/${num}.mp3`;

  audio.play().catch(e=>{
    console.log("audio blocked",e);
  });
}

// ================= CALL =================
function call(){
  if(!running) return;
  if(numbers.length===0) return;

  let num=numbers.pop();

  called.unshift(num);

  document.getElementById("currentBall").innerText=num;
  document.getElementById("recentList").innerText=
    called.slice(0,10).join(" • ");

  // highlight
  if(last) document.getElementById("c"+last)?.classList.remove("last");

  document.getElementById("c"+num)?.classList.add("called","last");
  last=num;

  play(num);
}

// ================= LOOP =================
function loop(){
  clearInterval(timer);

  timer=setInterval(()=>{
    if(!running) return;
    call();
  },7000);
}

// ================= TOGGLE =================
function toggle(){
  let btn=document.getElementById("startBtn");

  if(!running){
    running=true;
    btn.innerText="Pause";
    call();
    loop();
  }else{
    running=false;
    btn.innerText="Resume";
    clearInterval(timer);
  }
}

// ================= BINGO =================
function bingo(){
  running=false;
  clearInterval(timer);
  new Audio("audio/Bingo1.mp3").play();
}

// ================= RESET =================
function reset(){
  running=false;
  clearInterval(timer);
  document.getElementById("startBtn").innerText="Start";
  init();
}

// INIT
init();
</script>

</body>
</html>
