<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Caller</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  text-align: center;
}

.current {
  font-size: 60px;
  margin: 20px;
}

button {
  margin: 10px;
  padding: 12px 20px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.start { background: green; color: white; }
.reset { background: red; color: white; }
.bingo { background: gold; color: black; }
</style>
</head>

<body>

<h1>🎱 Bingo Caller</h1>

<div class="current" id="currentBall">--</div>

<button class="start" id="startBtn" onclick="toggleCalling()">Start</button>
<button class="bingo" onclick="callBingo()">BINGO</button>
<button class="reset" onclick="resetGame()">Reset</button>

<div id="recentList"></div>

<script>
let numbers = [];
let calledNumbers = [];

let isCalling = false;
let isPaused = false;
let isPlaying = false;

let selectedVoice = null;

// ================= INIT =================
function initGame() {
  numbers = Array.from({ length: 75 }, (_, i) => i + 1);

  for (let i = numbers.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
  }

  calledNumbers = [];

  document.getElementById("currentBall").textContent = "--";
  document.getElementById("recentList").textContent = "";
}

// ================= LETTER =================
function getLetter(num) {
  if (num <= 15) return "B";
  if (num <= 30) return "I";
  if (num <= 45) return "N";
  if (num <= 60) return "G";
  return "O";
}

// ================= VOICE =================
function loadVoices() {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return;

  selectedVoice =
    voices.find(v => v.name.toLowerCase().includes("female")) ||
    voices[0];
}

speechSynthesis.onvoiceschanged = loadVoices;
setTimeout(loadVoices, 500);

function speak(text) {
  return new Promise((resolve) => {
    if (!selectedVoice) {
      resolve();
      return;
    }

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.voice = selectedVoice;
    utterance.rate = 0.75;
    utterance.pitch = 1.2;

    utterance.onend = resolve;

    speechSynthesis.cancel();
    speechSynthesis.speak(utterance);
  });
}

// ================= PLAY =================
function playNumber(num) {
  return new Promise((resolve) => {
    isPlaying = true;

    const label = getLetter(num) + "-" + num;
    const audio = new Audio("./audio/" + num + ".mp3");

    let finished = false;

    const done = () => {
      if (finished) return;
      finished = true;
      isPlaying = false;
      resolve();
    };

    // 🎧 If audio exists
    audio.onended = done;

    // ❌ If missing → voice
    audio.onerror = async () => {
      await speak(label);
      done();
    };

    // Try play
    audio.play().catch(async () => {
      await speak(label);
      done();
    });
  });
}

// ================= LOOP =================
async function loop() {
  if (!isCalling) return;

  if (isPaused || isPlaying) {
    setTimeout(loop, 300);
    return;
  }

  if (numbers.length === 0) return;

  const num = numbers.pop();
  calledNumbers.unshift(num);

  document.getElementById("currentBall").textContent = num;
  document.getElementById("recentList").textContent =
    calledNumbers.slice(0, 10).join(", ");

  await playNumber(num);

  // 🔥 WAIT 7 seconds AFTER FINISH
  setTimeout(loop, 7000);
}

// ================= START =================
function toggleCalling() {
  const btn = document.getElementById("startBtn");

  if (!isCalling) {
    isCalling = true;
    isPaused = false;
    btn.textContent = "Pause";
    loop();
  } 
  else if (!isPaused) {
    isPaused = true;
    btn.textContent = "Resume";
  } 
  else {
    isPaused = false;
    btn.textContent = "Pause";
    loop();
  }
}

// ================= BINGO =================
function callBingo() {
  isCalling = false;

  let rand = Math.floor(Math.random() * 5) + 1;
  new Audio("./audio/Bingo" + rand + ".mp3").play();
}

// ================= RESET =================
function resetGame() {
  isCalling = false;
  isPaused = false;
  isPlaying = false;

  document.getElementById("startBtn").textContent = "Start";

  initGame();
}

// INIT
initGame();
</script>

</body>
</html>
