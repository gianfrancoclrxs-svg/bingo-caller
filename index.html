<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo Caller</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  text-align: center;
  margin: 0;
  padding: 10px;
}

h1 {
  font-size: 20px;
}

.current {
  font-size: 55px;
  margin: 10px;
  font-weight: bold;
  color: gold;
}

button {
  margin: 5px;
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

.start { background: green; color: white; }
.reset { background: red; color: white; }
.bingo { background: gold; color: black; }

#recentList {
  font-size: 14px;
  margin-top: 5px;
}

/* VERTICAL GRID */
.board-wrapper {
  display: flex;
  justify-content: center;
  margin-top: 15px;
}

.board {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  max-width: 250px;
}

.cell {
  width: 45px;
  height: 45px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #222;
  border-radius: 6px;
  font-size: 12px;
}

.called {
  background: #444;
  color: #888;
}

.last {
  background: red !important;
  color: white !important;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🎱 Bingo Caller</h1>

<div class="current" id="currentBall">--</div>

<button class="start" id="startBtn" onclick="toggleCalling()">Start</button>
<button class="bingo" onclick="callBingo()">BINGO</button>
<button class="reset" onclick="resetGame()">Reset</button>

<div id="recentList"></div>

<div class="board-wrapper">
  <div class="board" id="board"></div>
</div>

<script>
let numbers = [];
let calledNumbers = [];

let isCalling = false;
let isPaused = false;

let interval = null;
let lastCalled = null;

// 🔥 AUDIO CACHE (IMPORTANT FIX)
let audioCache = {};

// ================= INIT =================
function initGame() {
  numbers = Array.from({ length: 75 }, (_, i) => i + 1);

  for (let i = numbers.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
  }

  calledNumbers = [];
  lastCalled = null;

  document.getElementById("currentBall").textContent = "--";
  document.getElementById("recentList").textContent = "";

  buildBoard();
  preloadAudio();
}

// ================= PRELOAD AUDIO =================
function preloadAudio() {
  for (let i = 1; i <= 75; i++) {
    const audio = new Audio("./audio/" + i + ".mp3");
    audio.preload = "auto";
    audioCache[i] = audio;
  }
}

// ================= LETTER =================
function getLetter(num) {
  if (num <= 15) return "B";
  if (num <= 30) return "I";
  if (num <= 45) return "N";
  if (num <= 60) return "G";
  return "O";
}

// ================= AUDIO FIXED =================
function playAudio(num) {
  const audio = audioCache[num];
  if (!audio) return;

  try {
    audio.pause();
    audio.currentTime = 0;

    const playPromise = audio.play();

    if (playPromise !== undefined) {
      playPromise.catch(err => {
        console.log("Audio blocked:", err);
      });
    }
  } catch (e) {
    console.log("Audio error:", e);
  }
}

// ================= BOARD =================
function buildBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";

  for (let i = 1; i <= 75; i++) {
    const div = document.createElement("div");
    div.className = "cell";
    div.id = "cell-" + i;
    div.innerText = getLetter(i) + i;
    board.appendChild(div);
  }
}

// ================= UPDATE BOARD =================
function updateBoard(num) {
  if (lastCalled) {
    document.getElementById("cell-" + lastCalled)?.classList.remove("last");
  }

  document.getElementById("cell-" + num)?.classList.add("called", "last");

  lastCalled = num;
}

// ================= CALL BALL =================
function callNext() {
  if (!isCalling || isPaused) return;
  if (numbers.length === 0) return;

  const num = numbers.pop();
  const label = getLetter(num) + num;

  calledNumbers.unshift(label);

  document.getElementById("currentBall").textContent = label;

  document.getElementById("recentList").textContent =
    calledNumbers.slice(0, 8).join(" • ");

  playAudio(num);
  updateBoard(num);
}

// ================= LOOP =================
function startLoop() {
  clearInterval(interval);

  interval = setInterval(() => {
    if (!isCalling || isPaused) return;

    callNext();

    if (numbers.length === 0) {
      clearInterval(interval);
    }
  }, 7000);
}

// ================= START / PAUSE =================
function toggleCalling() {
  const btn = document.getElementById("startBtn");

  // 🔥 unlock audio (mobile fix)
  const unlock = new Audio("./audio/1.mp3");
  unlock.play().catch(() => {});

  if (!isCalling) {
    isCalling = true;
    isPaused = false;
    btn.textContent = "Pause";

    callNext();
    startLoop();
  } 
  else if (!isPaused) {
    isPaused = true;
    btn.textContent = "Resume";
  } 
  else {
    isPaused = false;
    btn.textContent = "Pause";
    startLoop();
  }
}

// ================= BINGO =================
function callBingo() {
  isCalling = false;
  clearInterval(interval);

  let rand = Math.floor(Math.random() * 5) + 1;
  new Audio("./audio/Bingo" + rand + ".mp3").play();
}

// ================= RESET =================
function resetGame() {
  isCalling = false;
  isPaused = false;

  clearInterval(interval);

  document.getElementById("startBtn").textContent = "Start";

  initGame();
}

// INIT
initGame();
</script>

</body>
</html>
